spring.application.name=empresa-transportista-efs
server.port=8080

# Bucket S3 (configurar con el nombre de tu bucket en AWS)
aws.s3.bucket=${AWS_S3_BUCKET:tu-bucket-guias}

# Configuracion EFS
efs.path=${EFS_PATH:/app/efs}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Logs AWS (util para depuracion en EC2)
logging.level.software.amazon.awssdk=DEBUG
logging.level.io.awspring.cloud=DEBUG

# Perfil de produccion: EFS montado en /app/efs via Docker (-v /home/ec2-user/efs:/app/efs)

# Azure AD B2C - validacion JWT (Resource Server)
# Issuer alineado con API Gateway JWT Authorizer azureidaas (user flow B2C_1_cdy2204-1)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://empresatransportistaefs.b2clogin.com/tfp/972f25cf-cd03-4c70-84ea-285778b48398/b2c_1_cdy2204-1/v2.0/
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://empresatransportistaefs.b2clogin.com/empresatransportistaefs.onmicrosoft.com/B2C_1_cdy2204-1/discovery/v2.0/keys
spring.security.oauth2.resourceserver.jwt.audiences=49f4ab51-5e0e-4139-9cf4-15f566581b07,https://EmpresaTransportistaEFS.onmicrosoft.com/49f4ab51-5e0e-4139-9cf4-15f566581b07/cdy2204-1
