services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guias}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guias_secret}
    networks:
      - guias-net

  postgres:
    image: postgres:16-alpine
    container_name: postgres-guias
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guias_db}
      POSTGRES_USER: ${POSTGRES_USER:-guias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guias_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../docker/init/postgres_guias_s8.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guias} -d ${POSTGRES_DB:-guias_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - guias-net

  producer:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: empresa-transportista-producer
    ports:
      - "8080:8080"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guias}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guias_secret}
      EFS_PATH: /app/efs
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-tu-bucket-guias}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - efs-data:/app/efs
    depends_on:
      - rabbitmq
    networks:
      - guias-net

  consumer:
    build:
      context: ../../Exp3_S8_lisbeth_bilbao_grupo_2_consumer
      dockerfile: Dockerfile
    container_name: empresa-transportista-consumer
    ports:
      - "8081:8081"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guias}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guias_secret}
      EFS_PATH: /app/efs
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-tu-bucket-guias}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DB_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-guias_db}
      DB_USER: ${POSTGRES_USER:-guias}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-guias_secret}
    volumes:
      - efs-data:/app/efs
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - guias-net

networks:
  guias-net:
    driver: bridge

volumes:
  efs-data:
  postgres-data:
