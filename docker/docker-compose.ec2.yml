# Stack Semana 8 en EC2 usando imagenes publicadas en DockerHub.
# Uso manual (si no usas GitHub Actions):
#   export DOCKERHUB_USERNAME=tu_usuario
#   export AWS_S3_BUCKET=cdy2204-1
#   docker compose -f docker-compose.ec2.yml up -d

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guias}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guias_secret}
    networks:
      - guias-net

  postgres:
    image: postgres:16-alpine
    container_name: postgres-guias
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guias_db}
      POSTGRES_USER: ${POSTGRES_USER:-guias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guias_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres_guias_s8.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guias} -d ${POSTGRES_DB:-guias_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - guias-net

  producer:
    image: ${DOCKERHUB_USERNAME}/empresa-transportista-efs:latest
    container_name: empresa-transportista-efs
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guias}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guias_secret}
      EFS_PATH: /app/efs
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
    volumes:
      - ${EFS_MOUNT_PATH:-/home/ec2-user/efs}:/app/efs
    depends_on:
      - rabbitmq
    networks:
      - guias-net

  consumer:
    image: ${DOCKERHUB_USERNAME}/empresa-transportista-consumer:latest
    container_name: empresa-transportista-consumer
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guias}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guias_secret}
      EFS_PATH: /app/efs
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      DB_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-guias_db}
      DB_USER: ${POSTGRES_USER:-guias}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-guias_secret}
    volumes:
      - ${EFS_MOUNT_PATH:-/home/ec2-user/efs}:/app/efs
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - guias-net

networks:
  guias-net:
    driver: bridge

volumes:
  postgres-data:
