name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

env:
  PRODUCER_IMAGE: empresa-transportista-efs
  CONSUMER_IMAGE: empresa-transportista-consumer

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Producer image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PRODUCER_IMAGE }}:latest \
            Exp3_S8_lisbeth_bilbao_grupo_2_producer
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PRODUCER_IMAGE }}:latest

      - name: Build and push Consumer image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CONSUMER_IMAGE }}:latest \
            Exp3_S8_lisbeth_bilbao_grupo_2_consumer
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CONSUMER_IMAGE }}:latest

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Configure SSH key file
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" | sed 's/\r$//' > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keygen -y -f ~/.ssh/ec2_deploy_key > /dev/null
          FINGERPRINT=$(ssh-keygen -lf ~/.ssh/ec2_deploy_key | awk '{print $2}')
          echo "Fingerprint detectado: $FINGERPRINT"
          echo "Fingerprint correcto (dsy2204-1.pem): SHA256:LMpmI/thDtRMsbFMMYywOeJQuOh1Om2Tm9jZditomF4"
          if [ "$FINGERPRINT" != "SHA256:LMpmI/thDtRMsbFMMYywOeJQuOh1Om2Tm9jZditomF4" ]; then
            echo "ERROR: EC2_SSH_KEY en GitHub NO es dsy2204-1.pem (probablemente pegaste labsuser.pem)"
            echo "Solucion: borra EC2_SSH_KEY en GitHub Secrets y pega el contenido de dsy2204-1.pem"
            exit 1
          fi
          echo "Clave dsy2204-1.pem validada correctamente"

      - name: Test SSH connection to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
        run: |
          EC2_HOST="$(echo "$EC2_HOST" | tr -d '[:space:]')"
          USER_SERVER="$(echo "$USER_SERVER" | tr -d '[:space:]')"
          echo "Conectando como: ${USER_SERVER}@${EC2_HOST}"
          ssh -i ~/.ssh/ec2_deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            "${USER_SERVER}@${EC2_HOST}" "echo SSH_OK && whoami && hostname"

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          EFS_MOUNT_PATH: ${{ secrets.EFS_MOUNT_PATH }}
          EFS_PATH: ${{ secrets.EFS_PATH }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
          ORACLE_JDBC_URL: ${{ secrets.ORACLE_JDBC_URL }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
        run: |
          EC2_HOST="$(echo "$EC2_HOST" | tr -d '[:space:]')"
          USER_SERVER="$(echo "$USER_SERVER" | tr -d '[:space:]')"
          AWS_S3_BUCKET="$(echo "$AWS_S3_BUCKET" | tr -d '[:space:]')"
          EFS_MOUNT_PATH="$(echo "${EFS_MOUNT_PATH:-/home/ec2-user/efs}" | tr -d '[:space:]')"
          EFS_PATH="$(echo "${EFS_PATH:-/app/efs}" | tr -d '[:space:]')"
          RABBITMQ_USER="$(echo "${RABBITMQ_USER:-guias}" | tr -d '[:space:]')"
          RABBITMQ_PASS="${RABBITMQ_PASS:-guias_secret}"
          SSH_BASE=(ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          SCP_BASE=(scp -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          TARGET="${USER_SERVER}@${EC2_HOST}"

          echo "EFS montaje EC2: ${EFS_MOUNT_PATH} -> contenedor: ${EFS_PATH}"
          "${SSH_BASE[@]}" "$TARGET" "mkdir -p ~/app-s8 && sudo mkdir -p '${EFS_MOUNT_PATH}'"
          "${SSH_BASE[@]}" "$TARGET" "df -h | grep -E 'efs|${EFS_MOUNT_PATH}' || echo 'Verificar que EFS este montado en ${EFS_MOUNT_PATH}'"

          "${SCP_BASE[@]}" docker/docker-compose.ec2.yml "${TARGET}:~/app-s8/docker-compose.ec2.yml"

          {
            echo "DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}"
            echo "RABBITMQ_USER=${RABBITMQ_USER}"
            echo "RABBITMQ_PASS=${RABBITMQ_PASS}"
            echo "AWS_S3_BUCKET=${AWS_S3_BUCKET}"
            echo "AWS_REGION=us-east-1"
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}"
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}"
            echo "AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}"
            echo "EFS_MOUNT_PATH=${EFS_MOUNT_PATH}"
            echo "ORACLE_JDBC_URL=${ORACLE_JDBC_URL}"
            echo "ORACLE_USER=${ORACLE_USER}"
            echo "ORACLE_PASSWORD=${ORACLE_PASSWORD}"
          } > /tmp/deploy.env
          "${SCP_BASE[@]}" /tmp/deploy.env "${TARGET}:~/app-s8/.env"
          rm -f /tmp/deploy.env

          "${SSH_BASE[@]}" "$TARGET" "echo '${DOCKERHUB_TOKEN}' | docker login -u '${DOCKERHUB_USERNAME}' --password-stdin"

          "${SSH_BASE[@]}" "$TARGET" "docker stop ${{ env.PRODUCER_IMAGE }} 2>/dev/null || true; docker rm ${{ env.PRODUCER_IMAGE }} 2>/dev/null || true"
          "${SSH_BASE[@]}" "$TARGET" "docker stop ${{ env.CONSUMER_IMAGE }} 2>/dev/null || true; docker rm ${{ env.CONSUMER_IMAGE }} 2>/dev/null || true"

          "${SSH_BASE[@]}" "$TARGET" "cd ~/app-s8 && docker compose -f docker-compose.ec2.yml pull"
          "${SSH_BASE[@]}" "$TARGET" "cd ~/app-s8 && docker compose -f docker-compose.ec2.yml up -d"
          "${SSH_BASE[@]}" "$TARGET" "cd ~/app-s8 && docker compose -f docker-compose.ec2.yml ps"
          "${SSH_BASE[@]}" "$TARGET" "docker ps"
          "${SSH_BASE[@]}" "$TARGET" "docker exec ${{ env.PRODUCER_IMAGE }} ls -la ${EFS_PATH} || true"
